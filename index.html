<style>
  *{box-sizing:border-box}
  html,body{height:100%;margin:0}
  body{font-family:"Hiragino Kaku Gothic ProN","Hiragino Sans","Yu Gothic",Meiryo,sans-serif;background:#fff;color:#0f172a}
  .wrap{min-height:100%;display:flex;align-items:center;justify-content:center;padding:24px}
  .card{width:100%;max-width:330px;text-align:center}
  .badge{width:56px;height:56px;border-radius:16px;background:#ea580c;display:flex;align-items:center;justify-content:center;margin:0 auto 16px}
  h1{font-size:18px;margin:0 0 4px;font-weight:700}
  .sub{font-size:12px;color:#94a3b8;margin:0 0 20px}
  input{width:100%;height:50px;text-align:center;font-size:22px;letter-spacing:8px;border:1px solid #e2e8f0;border-radius:12px;outline:none;background:#fff}
  input:focus{border-color:#fb923c;box-shadow:0 0 0 3px rgba(251,146,60,.30)}
  button{width:100%;height:48px;margin-top:12px;border:0;border-radius:12px;background:#ea580c;color:#fff;font-size:15px;font-weight:700;cursor:pointer}
  button:active{background:#c2410c}
  button:disabled{opacity:.6;cursor:default}
  .err{color:#dc2626;font-size:13px;margin-top:12px;min-height:18px}
</style>

function b2b(b){const s=atob(b),a=new Uint8Array(s.length);for(let i=0;i<s.length;i++)a[i]=s.charCodeAt(i);return a;}
/* ===== 締切プッシュ通知（リクエスト締切の3日前・前日） ===== */
const VAPID_PUBLIC="BE3c363LSHZuk8K7EGyhDSXbp2c2z26GQNUN2JgTnVW5XO-0q12RUGGvnQOwcI6eGdGMU85X_HsdVwToLI66wGM";
const PUSH_URL="";                       /* ←Apps Scriptをデプロイしたら、ここにウェブアプリのURLを貼り付け */
const PUSH_TOKEN="bihin-push-7f3a9c2e";  /* ←Apps Script側の PUSH_TOKEN と必ず同じ値にする */
let LATEST_DEADLINE="";
function urlB64ToU8(s){const pad="=".repeat((4-s.length%4)%4);const b=(s+pad).replace(/-/g,"+").replace(/_/g,"/");const raw=atob(b);return Uint8Array.from([...raw].map(c=>c.charCodeAt(0)));}
if("serviceWorker" in navigator){navigator.serviceWorker.register("sw.js").catch(()=>{});}
window.addEventListener("message",ev=>{
  const d=ev.data||{};
  if(d.type==="deadline"){
    LATEST_DEADLINE=d.value||"";
    if(PUSH_URL&&LATEST_DEADLINE){
      fetch(PUSH_URL,{method:"POST",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify({action:"setdeadline",token:PUSH_TOKEN,deadline:LATEST_DEADLINE,nextBuy:d.nextBuy||""})}).catch(()=>{});
    }
  }
});
async function enablePush(btn){
  try{
    if(!("serviceWorker" in navigator)||!("PushManager" in window)||!("Notification" in window)){
      alert("この端末・ブラウザはプッシュ通知に対応していません。\niPhoneは Safari で開き『ホーム画面に追加』してから、そのアイコンで開いてください（iOS 16.4 以上が必要）。");return;
    }
    if(!PUSH_URL){ alert("通知サーバーがまだ設定されていません（PUSH_URL）。管理者にお問い合わせください。");return; }
    const perm=await Notification.requestPermission();
    if(perm!=="granted"){ alert("通知が許可されませんでした。端末の設定からこのアプリの通知を許可してください。");return; }
    const reg=await navigator.serviceWorker.ready;
    let sub=await reg.pushManager.getSubscription();
    if(!sub) sub=await reg.pushManager.subscribe({userVisibleOnly:true,applicationServerKey:urlB64ToU8(VAPID_PUBLIC)});
    await fetch(PUSH_URL,{method:"POST",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify({action:"subscribe",token:PUSH_TOKEN,sub:sub.toJSON(),deadline:LATEST_DEADLINE})});
    if(btn){btn.textContent="🔔 通知オン";btn.style.background="#16a34a";}
    alert("締切通知をオンにしました。リクエスト締切の3日前と前日にお知らせします。");
  }catch(e){ alert("通知の設定に失敗しました: "+(e&&e.message||e)); }
}
async function mountBell(){
  let on=false;
  try{ const reg=await navigator.serviceWorker.ready; on=!!(await reg.pushManager.getSubscription()); }catch(_){}
  if(document.getElementById("pushbell"))return;
  const b=document.createElement("button");
  b.id="pushbell";b.type="button";b.textContent=on?"🔔 通知オン":"🔔 締切通知";
  b.style.cssText="position:fixed;right:14px;bottom:78px;z-index:2147483647;border:0;border-radius:999px;padding:10px 14px;font-size:13px;font-weight:700;color:#fff;background:"+(on?"#16a34a":"#ea580c")+";box-shadow:0 6px 18px rgba(0,0,0,.25);cursor:pointer";
  b.addEventListener("click",()=>enablePush(b));
  document.body.appendChild(b);
}
async function unlock(pw){
  const km=await crypto.subtle.importKey("raw",new TextEncoder().encode(pw),"PBKDF2",false,["deriveKey"]);
  const key=await crypto.subtle.deriveKey({name:"PBKDF2",salt:b2b(SALT),iterations:ITER,hash:"SHA-256"},km,{name:"AES-GCM",length:256},false,["decrypt"]);
  const buf=await crypto.subtle.decrypt({name:"AES-GCM",iv:b2b(IV)},key,b2b(CT));
  return new TextDecoder().decode(buf);
}
const pw=document.getElementById("pw"),go=document.getElementById("go"),err=document.getElementById("err");
let busy=false;
async function attempt(){
  if(busy||!pw.value)return;
  busy=true;err.textContent="";go.disabled=true;go.textContent="解錠中…";
  try{
    const html=await unlock(pw.value);
    document.body.innerHTML="";
    const f=document.createElement("iframe");
    f.title="備品購入";
    f.style.cssText="position:fixed;inset:0;width:100%;height:100%;border:0";
    document.body.appendChild(f);
    f.srcdoc=html;
    mountBell();
  }catch(e){
    busy=false;go.disabled=false;go.textContent="解錠する";
    err.textContent="パスワードが違います";pw.value="";pw.focus();
  }
}
go.addEventListener("click",attempt);
pw.addEventListener("keydown",e=>{if(e.key==="Enter")attempt();});
pw.focus();

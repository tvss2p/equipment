function b2b(b){const s=atob(b),a=new Uint8Array(s.length);for(let i=0;i<s.length;i++)a[i]=s.charCodeAt(i);return a;}
async function unlock(pw){
  const km=await crypto.subtle.importKey("raw",new TextEncoder().encode(pw),"PBKDF2",false,["deriveKey"]);
  const key=await crypto.subtle.deriveKey({name:"PBKDF2",salt:b2b(SALT),iterations:ITER,hash:"SHA-256"},km,{name:"AES-GCM",length:256},false,["decrypt"]);
  const buf=await crypto.subtle.decrypt({name:"AES-GCM",iv:b2b(IV)},key,b2b(CT));
  return new TextDecoder().decode(buf);
}
function requestPushPermission(btn){
  return new Promise((resolve,reject)=>{
    window.OneSignalDeferred.push(async function(OneSignal){
      try{
        if(!OneSignal.Notifications.isPushSupported()||Notification.permission==="denied"){
          if(btn)updateNotificationStatus(btn,false);
          resolve(false);
          return;
        }
        await OneSignal.Notifications.requestPermission();
        await OneSignal.User.PushSubscription.optIn();
        const enabled=OneSignal.Notifications.permission||OneSignal.User.PushSubscription.optedIn;
        if(btn)updateNotificationStatus(btn,enabled||Notification.permission==="granted");
        resolve(enabled);
      }catch(e){
        reject(e);
      }
    });
  });
}
function updateNotificationStatus(btn,on){
  btn.disabled=false;
  btn.classList.toggle("is-off",!on);
  btn.textContent=on?"通知設定：オンです":"通知設定：オフ";
  btn.setAttribute("aria-label",on?"通知設定はオンです":"通知設定をオンにする");
}
function autoPromptPushOnce(){
  window.OneSignalDeferred.push(async function(OneSignal){
    const promptedKey="equipmentPushAutoPrompted";
    if(!OneSignal.Notifications.isPushSupported()||Notification.permission!=="default"||OneSignal.User.PushSubscription.optedIn||localStorage.getItem(promptedKey)==="1"){
      return;
    }
    localStorage.setItem(promptedKey,"1");
    try{
      if(OneSignal.Slidedown&&OneSignal.Slidedown.promptPush){
        await OneSignal.Slidedown.promptPush({force:true});
      }else{
        await OneSignal.Notifications.requestPermission();
      }
      if(Notification.permission==="granted"){
        await OneSignal.User.PushSubscription.optIn();
        const btn=document.querySelector(".notify-fab");
        if(btn)updateNotificationStatus(btn,true);
      }
    }catch(e){
      console.warn("OneSignal auto prompt failed",e);
    }
  });
}
function showNotificationStatus(){
  if(document.querySelector(".notify-fab"))return;
  window.OneSignalDeferred.push(function(OneSignal){
    if(!OneSignal.Notifications.isPushSupported()){
      return;
    }
    const btn=document.createElement("button");
    btn.type="button";
    btn.className="notify-fab";
    updateNotificationStatus(btn,Notification.permission==="granted"||OneSignal.User.PushSubscription.optedIn);
    btn.addEventListener("click",async()=>{
      if(Notification.permission==="granted"||OneSignal.User.PushSubscription.optedIn)return;
      btn.disabled=true;
      const label=btn.textContent;
      btn.textContent="設定中";
      try{
        await requestPushPermission(btn);
      }catch(e){
        console.warn("OneSignal push permission failed",e);
        btn.textContent=label;
        btn.disabled=false;
      }
    });
    document.body.appendChild(btn);
  });
}
window.addEventListener("message",e=>{
  if(!e.data||typeof e.data!=="object")return;
  if(e.data.type==="equipment-before-print"){
    document.documentElement.classList.add("is-printing-app");
  }
  if(e.data.type==="equipment-after-print"){
    document.documentElement.classList.remove("is-printing-app");
  }
});
const pw=document.getElementById("pw"),go=document.getElementById("go"),err=document.getElementById("err");
let busy=false;
async function attempt(){
  if(busy||!pw.value)return;
  busy=true;err.textContent="";go.disabled=true;go.textContent="解錠中…";
  try{
    const html=await unlock(pw.value);
    document.body.innerHTML="";
    const f=document.createElement("iframe");
    f.title="備品購入";
    f.style.cssText="position:fixed;inset:0;width:100%;height:100%;border:0";
    document.body.appendChild(f);
    f.srcdoc=html;
    autoPromptPushOnce();
    showNotificationStatus();
  }catch(e){
    busy=false;go.disabled=false;go.textContent="解錠する";
    err.textContent="パスワードが違います";pw.value="";pw.focus();
  }
}
go.addEventListener("click",attempt);
pw.addEventListener("keydown",e=>{if(e.key==="Enter")attempt();});
pw.focus();
</script>
